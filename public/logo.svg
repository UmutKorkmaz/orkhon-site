<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" role="img" aria-label="Orkhon logo">
  <defs>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a160e"/>
      <stop offset="1" stop-color="#0c0a08"/>
    </linearGradient>
    <linearGradient id="rune" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ff0e4"/>
      <stop offset="1" stop-color="#4fe3d4"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ecd9"/>
      <stop offset="1" stop-color="#d8cfb8"/>
    </linearGradient>
  </defs>

  <!-- Rune mark in stone tile -->
  <g transform="translate(8,8)">
    <rect width="80" height="80" rx="18" fill="url(#stone)"/>
    <rect x="0.75" y="0.75" width="78.5" height="78.5" rx="17.25" fill="none" stroke="#2a2418" stroke-width="1.5"/>
    <g fill="none" stroke="url(#rune)" stroke-width="7.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M40 16 L40 64"/>
      <path d="M40 31 L55 21"/>
      <path d="M40 49 L55 59"/>
    </g>
    <circle cx="25" cy="40" r="3.6" fill="#c08a3e"/>
  </g>

  <!-- Wordmark -->
  <text x="112" y="63" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="52" font-weight="600" letter-spacing="0.06em" fill="url(#ink)">ORKHON</text>
  <!-- cyan accent under the wordmark — the living mark -->
  <rect x="114" y="74" width="186" height="2.5" rx="1.25" fill="url(#rune)" opacity="0.85"/>
</svg>

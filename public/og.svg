<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-label="Orkhon — Turkic language models, from inscription to inference">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#131008"/>
      <stop offset="1" stop-color="#0c0a08"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="0%" r="75%">
      <stop offset="0" stop-color="#c08a3e" stop-opacity="0.10"/>
      <stop offset="0.55" stop-color="#4fe3d4" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#0c0a08" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rune" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7ff0e4"/>
      <stop offset="1" stop-color="#4fe3d4"/>
    </linearGradient>
    <linearGradient id="ink" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f3ecd9"/>
      <stop offset="1" stop-color="#d8cfb8"/>
    </linearGradient>
    <linearGradient id="stone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a160e"/>
      <stop offset="1" stop-color="#0c0a08"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow)"/>
  <!-- hairline frame -->
  <rect x="48" y="48" width="1104" height="534" fill="none" stroke="#2a2418" stroke-width="2"/>

  <!-- rune tile -->
  <g transform="translate(96,150)">
    <rect width="200" height="200" rx="44" fill="url(#stone)"/>
    <rect x="1.5" y="1.5" width="197" height="197" rx="42.5" fill="none" stroke="#2a2418" stroke-width="3"/>
    <g fill="none" stroke="url(#rune)" stroke-width="18" stroke-linecap="round" stroke-linejoin="round">
      <path d="M100 44 L100 156"/>
      <path d="M100 80 L138 56"/>
      <path d="M100 120 L138 144"/>
    </g>
    <circle cx="62" cy="100" r="9" fill="#c08a3e"/>
  </g>

  <!-- wordmark -->
  <text x="340" y="285" font-family="'Cormorant Garamond', Georgia, 'Times New Roman', serif"
        font-size="128" font-weight="600" letter-spacing="0.05em" fill="url(#ink)">ORKHON</text>
  <rect x="344" y="312" width="470" height="5" rx="2.5" fill="url(#rune)" opacity="0.9"/>

  <!-- tagline -->
  <text x="344" y="372" font-family="'Cormorant Garamond', Georgia, serif"
        font-size="34" font-style="italic" fill="#a89f87">Turkic language models</text>
  <text x="344" y="416" font-family="'Inter', system-ui, sans-serif"
        font-size="26" letter-spacing="0.02em" fill="#d8cfb8">From inscription to inference.</text>

  <!-- kicker / url -->
  <text x="96" y="540" font-family="'SF Mono', ui-monospace, monospace"
        font-size="22" letter-spacing="0.32em" fill="#4fe3d4" font-weight="500">ORKHON.UMUTKORKMAZ.NET</text>
</svg>
